<footer class="mt-16 border-t-2 border-gray-700 py-8" data-simple-footer="true">
  <div class="container mx-auto px-4">
    <div class="flex items-center justify-between flex-wrap gap-4">
      <div>
        <div class="flex items-center mb-2">
          <img
            id="footer-logo"
            src="{{baseUrl}}{{#if brandLogo}}{{brandLogo}}{{else}}images/favicon.svg{{/if}}"
            alt="{{#if brandName}}{{brandName}}{{else}}Coopanest PDF{{/if}} Logo"
            class="h-8 w-8 mr-2"
          />
          <span id="footer-brand" class="text-white font-bold text-lg"
            >{{#if brandName}}{{brandName}}{{else}}Coopanest PDF{{/if}}</span
          >
        </div>
        <p id="footer-copyright" class="text-gray-400 text-sm">
          Desenvolvido com <span aria-label="amor">&#10084;&#65039;</span> pela
          <a
            href="https://headers.com.br"
            target="_blank"
            rel="noopener"
            class="text-emerald-400 hover:underline"
            >Headers</a
          >
          para Coopanest-CE
        </p>
        <p class="text-gray-500 text-xs mt-2">
          <span data-i18n="footer.version">Version</span>
          <span id="app-version">{{appVersion}}</span>
          &middot; Baseado no
          <a
            href="https://github.com/alam00000/bentopdf"
            target="_blank"
            rel="noopener"
            class="underline hover:text-gray-400"
            >BentoPDF</a
          >
          (AGPL-3.0)
        </p>
      </div>
      <div id="simple-mode-lang-switcher" class="flex-shrink-0"></div>
    </div>
  </div>
</footer>
